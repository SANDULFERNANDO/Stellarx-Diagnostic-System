<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StellarX - Case History</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            stellarNavy: '#114a72',
            stellarDark: '#0f2d4a',
            bgGray: '#f4f7f9'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-[#f4f7f9] min-h-screen text-slate-800 font-sans antialiased relative pb-12">

  <!-- ================= TOP NAVIGATION BAR ================= -->
  <nav class="bg-[#114a72] text-white px-6 md:px-16 py-4 flex items-center justify-between shadow-md">
    <div class="flex items-center space-x-2 cursor-pointer" onclick="window.location.href='dashboard.html'">
      <i data-lucide="layers" class="w-6 h-6 text-white"></i>
      <span class="text-xl font-black tracking-tight">StellarX</span>
    </div>

    <div class="flex items-center space-x-6">
      <a href="profile.html" class="w-8 h-8 bg-slate-200/20 hover:bg-slate-200/30 rounded-full flex items-center justify-center text-white transition-colors">
        <i data-lucide="user" class="w-4 h-4"></i>
      </a>
    </div>
  </nav>

  <!-- ================= MAIN WORKSPACE CONTENT ================= -->
  <main class="max-w-5xl mx-auto px-6 mt-10 space-y-6">
    
    <!-- Header Row -->
    <div class="flex items-center justify-between">
      <div class="space-y-1">
        <h1 class="text-3xl font-black text-slate-900 tracking-tight">Case History</h1>
        <p class="text-sm text-slate-500 font-medium">Review all previously analyzed diagnostic records and AI predictions.</p>
      </div>
      <button onclick="window.location.href='dashboard.html'" class="px-4 py-2 bg-white border border-slate-200 hover:border-slate-300 rounded-xl text-xs font-bold text-slate-700 shadow-sm transition-colors flex items-center gap-1.5">
        <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i> Back to Dashboard
      </button>
    </div>

    <hr class="border-slate-200/80">

    <!-- Full Case History Grid Wrapper -->
    <div class="bg-white rounded-xl border border-slate-200/60 shadow-sm p-6 space-y-4">
      <div class="flex items-center justify-between pb-2 border-b border-slate-100">
        <h2 class="text-base font-black text-slate-900 tracking-tight flex items-center gap-2">
          <i data-lucide="folder-heart" class="w-4 h-4 text-[#114a72]"></i> All Diagnostic Logs
        </h2>
        <span id="historyTotalCount" class="text-xs font-bold bg-slate-100 text-slate-600 px-2.5 py-1 rounded-full">Total: 0 Cases</span>
      </div>

      <!-- Dynamic History Items List Container -->
      <div id="fullHistoryContainer" class="space-y-3 pt-2">
        <p class="text-xs font-medium text-slate-400 py-8 text-center" id="noHistoryText">
          No diagnostic cases recorded in the system history yet.
        </p>
      </div>
    </div>
  </main>

  <!-- ================= CORE JAVASCRIPT ================= -->
  <script>
    window.onload = function() {
      lucide.createIcons();
      loadAllCaseHistory();
    }

    // පැරණි කේස් එකක් ක්ලික් කළ විට result.html වෙත රැගෙන යාම
    function viewCaseDetails() {
      window.location.href = 'result.html';
    }

    function loadAllCaseHistory() {
      const localHistory = JSON.parse(localStorage.getItem('stellarX_diagnostic_history')) || [];
      const container = document.getElementById('fullHistoryContainer');
      const countBadge = document.getElementById('historyTotalCount');
      
      countBadge.innerText = `Total: ${254 + localHistory.length} Cases`;

      let dynamicHtml = "";

      // 1. LocalStorage එකෙන් එන Live Data (click triggers එකතු කර ඇත)
      if (localHistory.length > 0) {
        document.getElementById('noHistoryText').classList.add('hidden');
        
        localHistory.forEach(item => {
          const badgeColor = item.severity === 'Severe' ? 'bg-red-50 text-red-700 border-red-100' : 
                             item.severity === 'Moderate' ? 'bg-amber-50 text-amber-700 border-amber-100' : 
                             'bg-emerald-50 text-emerald-700 border-emerald-100';
          
          const confidenceText = item.severity === 'Severe' ? 'High Confidence' : 'Medium Confidence';

          dynamicHtml += `
            <div onclick="viewCaseDetails()" class="bg-white rounded-xl border border-slate-200/60 p-4 shadow-sm flex items-center justify-between group hover:border-slate-300 hover:shadow-md cursor-pointer transition-all">
              <div class="grid grid-cols-3 gap-4 md:gap-12 flex-1">
                <div>
                  <span class="block text-[9px] font-bold text-slate-400 uppercase tracking-wider">Case ID</span>
                  <span class="text-xs font-black text-slate-800">${item.caseId ? item.caseId.replace('CASE_', '') : '1025'}</span>
                </div>
                <div>
                  <span class="block text-[9px] font-bold text-slate-400 uppercase tracking-wider">Date</span>
                  <span class="text-xs font-semibold text-slate-500">${item.date}</span>
                </div>
                <div>
                  <span class="block text-[9px] font-bold text-slate-400 uppercase tracking-wider">Top Prediction</span>
                  <span class="text-xs font-black text-slate-800 block truncate">${item.prediction}</span>
                </div>
              </div>
              <div class="flex items-center space-x-3">
                <span class="px-3 py-1 text-[10px] font-bold rounded-full ${badgeColor}">${confidenceText}</span>
                <i data-lucide="chevron-right" class="w-4 h-4 text-slate-400 group-hover:text-slate-600 group-hover:translate-x-0.5 transition-all"></i>
              </div>
            </div>`;
        });
      }

      // 2. Baseline Mock Data (click triggers එකතු කර ඇත)
      dynamicHtml += `
        <div onclick="viewCaseDetails()" class="bg-white rounded-xl border border-slate-200/60 p-4 shadow-sm flex items-center justify-between group hover:border-slate-300 hover:shadow-md cursor-pointer transition-all">
          <div class="grid grid-cols-3 gap-4 md:gap-12 flex-1">
            <div>
              <span class="block text-[9px] font-bold text-slate-400 uppercase tracking-wider">Case ID</span>
              <span class="text-xs font-black text-slate-800">1024</span>
            </div>
            <div>
              <span class="block text-[9px] font-bold text-slate-400 uppercase tracking-wider">Date</span>
              <span class="text-xs font-semibold text-slate-500">May 15</span>
            </div>
            <div>
              <span class="block text-[9px] font-bold text-slate-400 uppercase tracking-wider">Top Prediction</span>
              <span class="text-xs font-black text-slate-800 block truncate">Tinea Infection</span>
            </div>
          </div>
          <div class="flex items-center space-x-3">
            <span class="px-3 py-1 text-[10px] font-bold rounded-full bg-emerald-50 text-emerald-700 border border-emerald-100">High Confidence</span>
            <i data-lucide="chevron-right" class="w-4 h-4 text-slate-400 group-hover:text-slate-600 group-hover:translate-x-0.5 transition-all"></i>
          </div>
        </div>

        <div onclick="viewCaseDetails()" class="bg-white rounded-xl border border-slate-200/60 p-4 shadow-sm flex items-center justify-between group hover:border-slate-300 hover:shadow-md cursor-pointer transition-all">
          <div class="grid grid-cols-3 gap-4 md:gap-12 flex-1">
            <div>
              <span class="block text-[9px] font-bold text-slate-400 uppercase tracking-wider">Case ID</span>
              <span class="text-xs font-black text-slate-800">1023</span>
            </div>
            <div>
              <span class="block text-[9px] font-bold text-slate-400 uppercase tracking-wider">Date</span>
              <span class="text-xs font-semibold text-slate-500">May 14</span>
            </div>
            <div>
              <span class="block text-[9px] font-bold text-slate-400 uppercase tracking-wider">Top Prediction</span>
              <span class="text-xs font-black text-slate-800 block truncate">Psoriasis</span>
            </div>
          </div>
          <div class="flex items-center space-x-3">
            <span class="px-3 py-1 text-[10px] font-bold rounded-full bg-amber-50 text-amber-700 border border-amber-100">Medium Confidence</span>
            <i data-lucide="chevron-right" class="w-4 h-4 text-slate-400 group-hover:text-slate-600 group-hover:translate-x-0.5 transition-all"></i>
          </div>
        </div>
      `;

      container.innerHTML = dynamicHtml;
    }
  </script>
</body>
</html>
